<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#666"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#e03131"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#1971c2"/>
    </marker>
    <linearGradient id="streamGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a5d8ff"/>
      <stop offset="100%" stop-color="#d0ebff"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="360" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">Activation Steering: The Big Picture</text>

  <!-- Input tokens -->
  <text x="80" y="390" text-anchor="middle" font-size="13" fill="#555">Input tokens</text>
  <rect x="30" y="395" width="100" height="28" rx="4" fill="#e7f5ff" stroke="#74c0fc" stroke-width="1.5"/>
  <text x="80" y="414" text-anchor="middle" font-size="12" fill="#1971c2" font-weight="600">"I think this"</text>

  <!-- Residual stream (vertical) -->
  <line x1="80" y1="365" x2="80" y2="70" stroke="#74c0fc" stroke-width="3" marker-end="url(#arrowBlue)" stroke-dasharray="none"/>
  <text x="56" y="220" text-anchor="middle" font-size="11" fill="#1971c2" transform="rotate(-90, 56, 220)">Residual Stream h</text>

  <!-- Transformer layers -->
  <g>
    <rect x="40" y="330" width="80" height="30" rx="6" fill="#d0ebff" stroke="#74c0fc" stroke-width="1.5"/>
    <text x="80" y="350" text-anchor="middle" font-size="11" fill="#1971c2">Layer 0</text>
  </g>
  <g>
    <rect x="40" y="280" width="80" height="30" rx="6" fill="#d0ebff" stroke="#74c0fc" stroke-width="1.5"/>
    <text x="80" y="300" text-anchor="middle" font-size="11" fill="#1971c2">Layer 1</text>
  </g>
  <g>
    <text x="80" y="258" text-anchor="middle" font-size="16" fill="#999">...</text>
  </g>

  <!-- Target layer (highlighted) -->
  <rect x="35" y="190" width="90" height="34" rx="6" fill="#fff3bf" stroke="#fab005" stroke-width="2.5"/>
  <text x="80" y="212" text-anchor="middle" font-size="12" fill="#e67700" font-weight="700">Layer l</text>

  <g>
    <text x="80" y="175" text-anchor="middle" font-size="16" fill="#999">...</text>
  </g>
  <g>
    <rect x="40" y="130" width="80" height="30" rx="6" fill="#d0ebff" stroke="#74c0fc" stroke-width="1.5"/>
    <text x="80" y="150" text-anchor="middle" font-size="11" fill="#1971c2">Layer L</text>
  </g>

  <!-- Output -->
  <text x="80" y="63" text-anchor="middle" font-size="13" fill="#555">Next token</text>

  <!-- Steering vector injection arrow -->
  <line x1="200" y1="207" x2="130" y2="207" stroke="#e03131" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <text x="210" y="200" font-size="13" fill="#e03131" font-weight="700">+ a * v</text>
  <text x="210" y="218" font-size="11" fill="#c92a2a">steering injection</text>

  <!-- Right side: steering vector computation -->
  <rect x="320" y="60" width="380" height="340" rx="12" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5"/>
  <text x="510" y="88" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">Computing the Steering Vector</text>

  <!-- Positive prompt -->
  <rect x="345" y="110" width="140" height="36" rx="6" fill="#d3f9d8" stroke="#69db7c" stroke-width="1.5"/>
  <text x="415" y="133" text-anchor="middle" font-size="13" fill="#2b8a3e" font-weight="600">"Love"</text>
  <text x="415" y="160" text-anchor="middle" font-size="11" fill="#555">run through model</text>

  <!-- Arrow down -->
  <line x1="415" y1="165" x2="415" y2="185" stroke="#666" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- Activation pos -->
  <rect x="360" y="190" width="110" height="30" rx="4" fill="#ebfbee" stroke="#69db7c" stroke-width="1"/>
  <text x="415" y="210" text-anchor="middle" font-size="12" fill="#2b8a3e" font-weight="600">h_pos</text>

  <!-- Normalize -->
  <line x1="415" y1="225" x2="415" y2="248" stroke="#666" stroke-width="1.2" marker-end="url(#arrowGray)"/>
  <text x="455" y="240" font-size="10" fill="#868e96">normalize</text>

  <!-- Normalized pos -->
  <rect x="368" y="252" width="94" height="24" rx="4" fill="#ebfbee" stroke="#69db7c" stroke-width="1"/>
  <text x="415" y="269" text-anchor="middle" font-size="11" fill="#2b8a3e">h_pos (unit)</text>

  <!-- Negative prompt -->
  <rect x="535" y="110" width="140" height="36" rx="6" fill="#ffe3e3" stroke="#ff8787" stroke-width="1.5"/>
  <text x="605" y="133" text-anchor="middle" font-size="13" fill="#c92a2a" font-weight="600">"Hate"</text>
  <text x="605" y="160" text-anchor="middle" font-size="11" fill="#555">run through model</text>

  <!-- Arrow down -->
  <line x1="605" y1="165" x2="605" y2="185" stroke="#666" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- Activation neg -->
  <rect x="550" y="190" width="110" height="30" rx="4" fill="#fff5f5" stroke="#ff8787" stroke-width="1"/>
  <text x="605" y="210" text-anchor="middle" font-size="12" fill="#c92a2a" font-weight="600">h_neg</text>

  <!-- Normalize -->
  <line x1="605" y1="225" x2="605" y2="248" stroke="#666" stroke-width="1.2" marker-end="url(#arrowGray)"/>
  <text x="645" y="240" font-size="10" fill="#868e96">normalize</text>

  <!-- Normalized neg -->
  <rect x="558" y="252" width="94" height="24" rx="4" fill="#fff5f5" stroke="#ff8787" stroke-width="1"/>
  <text x="605" y="269" text-anchor="middle" font-size="11" fill="#c92a2a">h_neg (unit)</text>

  <!-- Minus sign and arrows converging -->
  <line x1="415" y1="280" x2="480" y2="315" stroke="#666" stroke-width="1.5"/>
  <line x1="605" y1="280" x2="540" y2="315" stroke="#666" stroke-width="1.5"/>
  <circle cx="510" cy="310" r="12" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="510" y="315" text-anchor="middle" font-size="16" fill="#333" font-weight="bold">-</text>

  <!-- Arrow down to result -->
  <line x1="510" y1="325" x2="510" y2="350" stroke="#e03131" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Steering vector result -->
  <rect x="440" y="355" width="140" height="34" rx="6" fill="#ffe8e8" stroke="#e03131" stroke-width="2"/>
  <text x="510" y="377" text-anchor="middle" font-size="14" fill="#c92a2a" font-weight="700">v_steer</text>

  <!-- Connecting line from steering vector to injection -->
  <line x1="440" y1="372" x2="280" y2="207" stroke="#e03131" stroke-width="1.5" stroke-dasharray="6,4"/>
</svg>
