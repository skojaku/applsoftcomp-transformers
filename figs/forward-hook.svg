<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#666"/>
    </marker>
    <marker id="arrRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#e03131"/>
    </marker>
    <marker id="arrGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2b8a3e"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#333">How PyTorch Forward Hooks Work</text>

  <!-- Normal flow (top) -->
  <text x="30" y="70" font-size="13" font-weight="600" fill="#555">Normal forward pass:</text>

  <!-- Input -->
  <rect x="30" y="80" width="100" height="40" rx="6" fill="#e7f5ff" stroke="#74c0fc" stroke-width="1.5"/>
  <text x="80" y="105" text-anchor="middle" font-size="12" fill="#1971c2" font-weight="600">input</text>

  <!-- Arrow -->
  <line x1="135" y1="100" x2="175" y2="100" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Layer box -->
  <rect x="180" y="80" width="140" height="40" rx="6" fill="#d0ebff" stroke="#74c0fc" stroke-width="2"/>
  <text x="250" y="105" text-anchor="middle" font-size="12" fill="#1971c2" font-weight="600">Decoder Layer l</text>

  <!-- Arrow -->
  <line x1="325" y1="100" x2="365" y2="100" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Output -->
  <rect x="370" y="80" width="100" height="40" rx="6" fill="#e7f5ff" stroke="#74c0fc" stroke-width="1.5"/>
  <text x="420" y="105" text-anchor="middle" font-size="12" fill="#1971c2" font-weight="600">output h</text>

  <!-- Arrow to next -->
  <line x1="475" y1="100" x2="515" y2="100" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="555" y="105" font-size="12" fill="#868e96">next layer</text>

  <!-- Hooked flow (bottom) -->
  <text x="30" y="170" font-size="13" font-weight="600" fill="#555">With a steering hook attached:</text>

  <!-- Input -->
  <rect x="30" y="185" width="100" height="40" rx="6" fill="#e7f5ff" stroke="#74c0fc" stroke-width="1.5"/>
  <text x="80" y="210" text-anchor="middle" font-size="12" fill="#1971c2" font-weight="600">input</text>

  <!-- Arrow -->
  <line x1="135" y1="205" x2="175" y2="205" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Layer box -->
  <rect x="180" y="185" width="140" height="40" rx="6" fill="#d0ebff" stroke="#74c0fc" stroke-width="2"/>
  <text x="250" y="210" text-anchor="middle" font-size="12" fill="#1971c2" font-weight="600">Decoder Layer l</text>

  <!-- Arrow to output -->
  <line x1="325" y1="205" x2="365" y2="205" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Output h -->
  <rect x="370" y="185" width="70" height="40" rx="6" fill="#e7f5ff" stroke="#74c0fc" stroke-width="1.5"/>
  <text x="405" y="210" text-anchor="middle" font-size="12" fill="#1971c2" font-weight="600">h</text>

  <!-- Hook intercepts -->
  <rect x="340" y="248" width="130" height="40" rx="8" fill="#fff3bf" stroke="#fab005" stroke-width="2"/>
  <text x="405" y="264" text-anchor="middle" font-size="11" fill="#e67700" font-weight="700">Hook function</text>
  <text x="405" y="280" text-anchor="middle" font-size="10" fill="#e67700">return h + a*v</text>

  <!-- Arrow from output down to hook -->
  <line x1="405" y1="230" x2="405" y2="245" stroke="#fab005" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Plus sign and steering vector -->
  <circle cx="495" cy="205" r="14" fill="#fff" stroke="#e03131" stroke-width="2"/>
  <text x="495" y="211" text-anchor="middle" font-size="18" fill="#e03131" font-weight="bold">+</text>

  <!-- Arrow from h to plus -->
  <line x1="445" y1="205" x2="478" y2="205" stroke="#666" stroke-width="1.5"/>

  <!-- Steering vector label -->
  <rect x="470" y="248" width="80" height="30" rx="4" fill="#ffe8e8" stroke="#e03131" stroke-width="1.5"/>
  <text x="510" y="268" text-anchor="middle" font-size="12" fill="#c92a2a" font-weight="700">a * v</text>

  <!-- Arrow from v to plus -->
  <line x1="510" y1="248" x2="500" y2="222" stroke="#e03131" stroke-width="1.5" marker-end="url(#arrRed)"/>

  <!-- Arrow from plus to modified output -->
  <line x1="512" y1="205" x2="555" y2="205" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Modified output -->
  <rect x="560" y="185" width="100" height="40" rx="6" fill="#d3f9d8" stroke="#69db7c" stroke-width="2"/>
  <text x="610" y="204" text-anchor="middle" font-size="12" fill="#2b8a3e" font-weight="700">h' = h + a*v</text>
  <text x="610" y="219" text-anchor="middle" font-size="10" fill="#2b8a3e">steered output</text>
</svg>
