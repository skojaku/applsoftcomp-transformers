<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="aHead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#868e96"/>
    </marker>
    <marker id="aRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#e03131"/>
    </marker>
    <marker id="aGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#2b8a3e"/>
    </marker>
    <marker id="aBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#1971c2"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#333">The Effect of Steering Coefficient a</text>

  <!-- 2D activation space -->
  <!-- Axes -->
  <line x1="100" y1="290" x2="600" y2="290" stroke="#ccc" stroke-width="1"/>
  <line x1="350" y1="310" x2="350" y2="50" stroke="#ccc" stroke-width="1"/>

  <!-- Origin point (h) -->
  <circle cx="350" cy="200" r="6" fill="#1971c2"/>
  <text x="365" y="196" font-size="13" fill="#1971c2" font-weight="700">h</text>
  <text x="365" y="212" font-size="10" fill="#1971c2">(original hidden state)</text>

  <!-- Steering direction vector -->
  <line x1="350" y1="200" x2="530" y2="130" stroke="#e03131" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="465" y="145" font-size="12" fill="#e03131" font-weight="600">v_steer direction</text>
  <text x="465" y="160" font-size="10" fill="#c92a2a">(positive = "Love")</text>

  <!-- Opposite direction label -->
  <text x="180" y="255" font-size="10" fill="#c92a2a">(negative = "Hate")</text>

  <!-- alpha = 0: just h -->
  <rect x="260" y="52" width="180" height="28" rx="5" fill="#e7f5ff" stroke="#74c0fc" stroke-width="1.5"/>
  <text x="350" y="71" text-anchor="middle" font-size="12" fill="#1971c2" font-weight="600">a = 0: unchanged (baseline)</text>

  <!-- alpha > 0: push toward Love -->
  <circle cx="440" cy="165" r="5" fill="#2b8a3e"/>
  <line x1="355" y1="197" x2="437" y2="168" stroke="#2b8a3e" stroke-width="2.5" marker-end="url(#aGreen)"/>
  <text x="453" y="170" font-size="12" fill="#2b8a3e" font-weight="600">a > 0</text>
  <rect x="445" y="175" width="145" height="22" rx="4" fill="#d3f9d8" stroke="#69db7c" stroke-width="1"/>
  <text x="518" y="191" text-anchor="middle" font-size="11" fill="#2b8a3e">"a really good watch"</text>

  <!-- alpha >> 0: too far -->
  <circle cx="510" cy="138" r="5" fill="#868e96"/>
  <line x1="355" y1="197" x2="507" y2="141" stroke="#868e96" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#aHead)"/>
  <text x="520" y="125" font-size="11" fill="#868e96">a >> 0</text>
  <rect x="515" y="100" width="120" height="22" rx="4" fill="#f1f3f5" stroke="#ced4da" stroke-width="1"/>
  <text x="575" y="116" text-anchor="middle" font-size="11" fill="#868e96">gibberish output</text>

  <!-- alpha < 0: push toward Hate -->
  <circle cx="280" cy="227" r="5" fill="#e03131"/>
  <line x1="345" y1="203" x2="283" y2="224" stroke="#e03131" stroke-width="2.5" marker-end="url(#aRed)"/>
  <text x="230" y="222" font-size="12" fill="#e03131" font-weight="600">a &lt; 0</text>
  <rect x="115" y="228" width="180" height="22" rx="4" fill="#ffe3e3" stroke="#ff8787" stroke-width="1"/>
  <text x="205" y="244" text-anchor="middle" font-size="11" fill="#c92a2a">"I hate when... the worst"</text>

  <!-- alpha << 0: too far negative -->
  <circle cx="210" cy="254" r="5" fill="#868e96"/>
  <line x1="345" y1="203" x2="213" y2="251" stroke="#868e96" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#aHead)"/>
  <text x="145" y="270" font-size="11" fill="#868e96">a &lt;&lt; 0</text>
  <rect x="115" y="275" width="120" height="22" rx="4" fill="#f1f3f5" stroke="#ced4da" stroke-width="1"/>
  <text x="175" y="291" text-anchor="middle" font-size="11" fill="#868e96">gibberish output</text>

  <!-- Sweet spot annotation -->
  <rect x="470" y="300" width="210" height="40" rx="8" fill="#fff9db" stroke="#fab005" stroke-width="1.5"/>
  <text x="575" y="316" text-anchor="middle" font-size="11" fill="#e67700" font-weight="600">The sweet spot is where a is</text>
  <text x="575" y="332" text-anchor="middle" font-size="11" fill="#e67700">strong enough to steer, but not to break.</text>
</svg>
